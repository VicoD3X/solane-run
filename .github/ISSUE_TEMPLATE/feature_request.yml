name: Feature request
description: Propose a Solane Run improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or user need does this solve?
      placeholder: Freight operators need...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Add...
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: The public repository is frontend-only.
      options:
        - Frontend only
        - API contract change
        - Requires private backend work
        - Unsure
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Design references, edge cases, or EVE-specific constraints.
