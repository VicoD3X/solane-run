services:
  api:
    build:
      context: ../apps/api
    environment:
      ESI_BASE_URL: ${ESI_BASE_URL:-https://esi.evetech.net/latest}
      ESI_DATASOURCE: ${ESI_DATASOURCE:-tranquility}
      ESI_COMPATIBILITY_DATE: ${ESI_COMPATIBILITY_DATE:-2024-06-11}
      ESI_USER_AGENT: ${ESI_USER_AGENT:-SolaneRun/0.1 contact:ops@solanerun.local}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080}
    ports:
      - "8000:8000"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - api
    ports:
      - "8080:80"
