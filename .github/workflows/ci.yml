name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web:
    name: Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint web
        run: npm run lint:web

      - name: Build web
        run: npm run build:web

  api:
    name: API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r apps/api/requirements-dev.txt

      - name: Test API
        run: python -m pytest apps/api/tests
